version: '3'
services:
  application-server:
    container_name: application-server
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    network_mode: host
    privileged: true
    command: sleep infinity
    environment:
      - HOME=/home/user

networks:
  default:
    name: app-network
    driver: bridge
